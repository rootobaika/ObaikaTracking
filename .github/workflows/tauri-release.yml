name: Tauri Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci-build:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  android-apk:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain for Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run tauri:android:init -- --ci

      - name: Build Android APK
        run: npm run tauri:android:build -- --ci --apk

      - name: Resolve unsigned APK path
        id: apk
        shell: bash
        run: |
          APK_PATH="$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*release*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "Unsigned APK not found."
            exit 1
          fi
          echo "unsigned_apk=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Decode Android signing keystore
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android-release.jks

      - name: Sign Android APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: sign
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing one of required secrets: ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            exit 1
          fi

          UNSIGNED="${{ steps.apk.outputs.unsigned_apk }}"
          DIR="$(dirname "$UNSIGNED")"
          ALIGNED="$DIR/app-universal-release-aligned.apk"
          SIGNED="$DIR/app-universal-release-signed.apk"
          BT="$ANDROID_HOME/build-tools/34.0.0"

          "$BT/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"
          "$BT/apksigner" sign \
            --ks android-release.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$SIGNED" \
            "$ALIGNED"
          "$BT/apksigner" verify --verbose "$SIGNED"

          echo "signed_apk=$SIGNED" >> "$GITHUB_OUTPUT"

      - name: Upload Android APK artifact (signed)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.sign.outputs.signed_apk }}
          if-no-files-found: error

      - name: Upload Android APK artifact (unsigned)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.unsigned_apk }}
          if-no-files-found: error

      - name: Attach Android APK to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.sign.outputs.signed_apk }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-tauri:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release versions
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "Tag version:     $TAG_VERSION"
          echo "Tauri version:   $TAURI_VERSION"
          echo "Package version: $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$TAURI_VERSION" ] || [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Version mismatch. Use the same version in tag, src-tauri/tauri.conf.json and package.json."
            exit 1
          fi

      - name: Generate release notes from commits
        id: notes
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            TITLE="Изменения с ${PREV_TAG} по ${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
            TITLE="Первый релиз ${CURRENT_TAG}"
          fi

          NOTES="$(git log --no-merges --pretty=format:'- %s (%h)' "$RANGE")"
          if [ -z "$NOTES" ]; then
            NOTES="- Технический релиз без заметных изменений."
          fi

          {
            echo "release_body<<EOF"
            echo "${TITLE}"
            echo
            echo "${NOTES}"
            echo
            echo "Полный список файлов доступен в assets релиза."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Obaika Tracker ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri
